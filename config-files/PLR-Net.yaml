SOLVER:
  IMS_PER_BATCH: 1
  BASE_LR: 1e-4
  MAX_EPOCH: 150
  STEPS: (13,)
  WEIGHT_DECAY: 0.0001
  CHECKPOINT_PERIOD: 1
  OPTIMIZER: "ADAM"
  AMSGRAD: True

DATALOADER:
  NUM_WORKERS: 4

DATASETS:
  IMAGE:
    PIXEL_MEAN: [0.1036, 0.0983, 0.0688]
    PIXEL_STD: [0.0540, 0.0346, 0.0309]
    TO_255: False
    HEIGHT: 256
    WIDTH: 256
  TARGET:
    HEIGHT: 256
    WIDTH: 256
  ORIGIN:
    HEIGHT: 256
    WIDTH: 256
  ROTATE_F: True   # enable full D4 augmentation (flips + 90/270 rotations)
  TRAIN: ("ai4sf_train",)
  TEST: ("ai4sf_val",)


MODEL:
  NAME: "BsiNet_2"
  HEAD_SIZE: [[2]]
  OUT_FEATURE_CHANNELS: 64
  LOSS_WEIGHTS:
    loss_joff: 1.0    # joff  regression, increased from 0.25 to let offsets learn
    loss_jloc: 4.0    # jloc  classification, reduced from 8.0 to balance with joff
    loss_mask: 1.0
    loss_afm : 0.1
    loss_remask : 1.0

OUTPUT_DIR: "/mnt/DATA/IMANE/PLR-Net_output/PLR-Net"
